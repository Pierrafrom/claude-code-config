# Run `pre-commit autoupdate` right after copying this file to pin the
# current hook versions — don't trust hardcoded revs in a template, they go
# stale silently.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.0  # placeholder — run `pre-commit autoupdate`
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.0.0  # placeholder — run `pre-commit autoupdate`
    hooks:
      - id: mdformat
        additional_dependencies: [mdformat-gfm]

  # Local hook, not pre-commit/mirrors-mypy: that hook runs mypy in its own
  # isolated venv with none of the project's dependencies installed, so it
  # silently degrades to ignore_missing_imports for every third-party type
  # instead of actually checking against them. Running through `uv run`
  # uses the project's real synced environment (see rules/python/typing-strict.md).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]

  # C/C++ projects only (see rules/cpp/lint-strict.md) — drop the block
  # above if the project has no Python, drop this one if it has no C/C++.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v0.0.0  # placeholder — run `pre-commit autoupdate`
    hooks:
      - id: clang-format

  # Local hooks, not pre-commit mirrors: clang-tidy needs the project's
  # real compile_commands.json (include paths, defines) to analyze
  # correctly — a mirror running in an isolated environment can't see the
  # actual build configuration, same rationale as the local mypy hook above.
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy -p build --warnings-as-errors='*'
        language: system
        types_or: [c, c++]
      - id: cppcheck
        name: cppcheck
        entry: cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem
        language: system
        types_or: [c, c++]
