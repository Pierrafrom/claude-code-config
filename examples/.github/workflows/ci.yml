# Mirrors the local quality gate: ruff (lint + format) + mypy (strict
# typing) + pytest (tests + coverage) — same tools as .pre-commit-config.yaml
# and rules/python/lint-strict.md / typing-strict.md, so CI never disagrees
# with what a local commit already enforced.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check astral-sh/setup-uv releases for the current major version
      # before reusing this template on a new project.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy src

      - name: Tests
        run: uv run pytest
